name: Deploy DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_DEV }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER_DEV }}
      SNOWFLAKE_ROLE: CICD_ROLE
      SNOWFLAKE_WAREHOUSE: CICD_WH
      SNOWFLAKE_DATABASE: CICD_DEV_DB
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW_DEV }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE_DEV }}
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: snowflakedb/snowflake-cli-action@v2

      - name: Deploy SQL
        run: |
          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'Snowflake/**/*.sql' || true)

          if [ -z "$FILES" ]; then
            echo "No SQL changes"
            exit 0
          fi

          for file in $(echo "$FILES" | sort); do
            echo "Running $file"
            snow sql -f "$file"
          done
