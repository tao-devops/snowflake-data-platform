name: Deploy DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_DEV }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER_DEV }}
      SNOWFLAKE_ROLE: CICD_ROLE
      SNOWFLAKE_WAREHOUSE: CICD_WH
      SNOWFLAKE_DATABASE: CICD_DEV_DB
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW_DEV }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE_DEV }}
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@main

      - name: Print non-secret settings
        shell: bash
        run: |
          echo "SNOWFLAKE_ACCOUNT=$SNOWFLAKE_ACCOUNT"
          echo "SNOWFLAKE_USER=$SNOWFLAKE_USER"
          echo "SNOWFLAKE_ROLE=$SNOWFLAKE_ROLE"
          echo "SNOWFLAKE_WAREHOUSE=$SNOWFLAKE_WAREHOUSE"
          echo "SNOWFLAKE_DATABASE=$SNOWFLAKE_DATABASE"

      - name: Validate secret presence
        shell: bash
        run: |
          [ -n "$SNOWFLAKE_PRIVATE_KEY_RAW" ] || { echo "Missing private key"; exit 1; }
          [ -n "$PRIVATE_KEY_PASSPHRASE" ] || { echo "Missing passphrase"; exit 1; }
          echo "Secrets are present"

      - name: Show runner time
        shell: bash
        run: |
          date -u
          timedatectl || true

      - name: Test Snowflake connection with retry
        shell: bash
        run: |
          success=0
          for i in 1 2 3; do
            echo "Connection test attempt $i"
            if snow connection test -x --debug; then
              success=1
              break
            fi
            echo "Connection test failed, waiting before retry..."
            sleep 5
          done

          if [ "$success" -ne 1 ]; then
            echo "Snowflake connection test failed after 3 attempts"
            exit 1
          fi

      - name: Deploy SQL
        shell: bash
        run: |
          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^Snowflake/.*\.sql$' || true)

          if [ -z "$FILES" ]; then
            echo "No SQL changes"
            exit 0
          fi

          echo "SQL files to run:"
          echo "$FILES"

          FILES_SORTED=$(echo "$FILES" | sort)

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Running $file"
            snow sql -x -f "$file"
          done <<< "$FILES_SORTED"
