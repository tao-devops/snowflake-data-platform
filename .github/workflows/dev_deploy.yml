name: Deploy DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: dvmfrac-bj63182
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER_DEV }}
      SNOWFLAKE_ROLE: CICD_ROLE
      SNOWFLAKE_WAREHOUSE: CICD_WH
      SNOWFLAKE_DATABASE: CICD_DEV_DB
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW_DEV }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Prepare Snowflake private key
        shell: bash
        run: |
          printf "%b" "$SNOWFLAKE_PRIVATE_KEY_RAW" > /tmp/snowflake_key.p8
          chmod 600 /tmp/snowflake_key.p8
          echo "SNOWFLAKE_PRIVATE_KEY_PATH=/tmp/snowflake_key.p8" >> $GITHUB_ENV
          head -2 /tmp/snowflake_key.p8
          tail -2 /tmp/snowflake_key.p8

      - name: Test Snowflake connection
        shell: bash
        run: |
          snow --version
          snow connection test --temporary-connection --debug

      - name: Deploy SQL
        shell: bash
        run: |
          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^Snowflake/.*\.sql$' || true)

          if [ -z "$FILES" ]; then
            echo "No SQL changes"
            exit 0
          fi

          echo "SQL files to run:"
          echo "$FILES" | sort

          while IFS= read -r file; do
            echo "Running $file"
            snow sql --temporary-connection -f "$file"
          done <<< "$(echo "$FILES" | sort)"
